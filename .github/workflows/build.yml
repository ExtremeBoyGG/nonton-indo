name: Build Extensions

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build all plugins
        run: ./gradlew assembleRelease

      - name: Copy .cs3 files to build/
        run: |
          mkdir -p build
          find . -name "*.cs3" -exec cp {} build/ \;
          ls -la build/

      - name: Update plugins.json with file sizes
        run: |
          python3 << 'PYEOF'
          import os, json, glob
          
          # Read current plugins.json
          with open('plugins.json', 'r') as f:
              plugins = json.load(f)
          
          # Update file sizes
          for plugin in plugins:
              cs3_file = f"build/{plugin['internalName']}.cs3"
              if os.path.exists(cs3_file):
                  plugin['fileSize'] = os.path.getsize(cs3_file)
                  plugin['version'] = plugin.get('version', 0) + 1
          
          # Write updated plugins.json
          with open('plugins.json', 'w') as f:
              json.dump(plugins, f, indent=4)
          
          print("Updated plugins.json:")
          print(json.dumps(plugins, indent=4))
          PYEOF

      - name: Commit plugins.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add plugins.json
          git diff --staged --quiet || git commit -m "chore: Update plugins.json [skip ci]"
          git push

      - name: Upload .cs3 to Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Build #${{ github.run_number }}
          files: build/*.cs3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
