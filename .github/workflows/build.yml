name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - '*.png'
      - '*.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"

      - name: Clean old builds
        run: rm -f $GITHUB_WORKSPACE/builds/*.cs3

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          chmod +x gradlew
          ./gradlew assembleRelease
          find . -name "*.cs3" -exec cp {} $GITHUB_WORKSPACE/builds/ \;

      - name: Update plugins.json with file sizes
        run: |
          cd $GITHUB_WORKSPACE/builds
          python3 $GITHUB_WORKSPACE/src/.github/scripts/update_plugins.py

      - name: Update repo.json
        run: |
          cd $GITHUB_WORKSPACE/builds
          python3 $GITHUB_WORKSPACE/src/.github/scripts/update_repo.py

      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit --amend -m "Build $GITHUB_SHA" || exit 0
          git push --force
